<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — ShopApp</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="nav-logo">Shop<span class="dot">.</span></div>

    <!-- LOGIN -->
    <div id="loginPanel">
      <p class="auth-sub">Welcome back. Sign in to continue.</p>
      <div id="loginError" class="auth-error hidden"></div>

      <div class="field-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com">
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Your password">
      </div>
      <button class="btn-primary btn-full" onclick="handleLogin()" id="loginBtn">Sign In</button>

      <div class="auth-switch">
        New here? <a onclick="showPanel('register')">Create an account</a>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="registerPanel" class="hidden">
      <p class="auth-sub">Create your account in seconds.</p>
      <div id="registerError" class="auth-error hidden"></div>

      <div class="field-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Jordan Lee">
      </div>
      <div class="field-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com">
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="At least 6 characters">
      </div>
      <button class="btn-primary btn-full" onclick="handleRegister()" id="registerBtn">Create Account</button>

      <div class="auth-switch">
        Already have an account? <a onclick="showPanel('login')">Sign in</a>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/auth.js"></script>
</body>
</html>
