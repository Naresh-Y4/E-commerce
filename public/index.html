<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopApp — Everyday goods, well made</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <div class="nav-logo">Shop<span class="dot">.</span></div>

  <div class="nav-search">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search products..." oninput="handleSearch(this.value)">
  </div>

  <div class="nav-links">
    <div class="nav-link" onclick="window.location.href='cart.html'">
      🛒 Cart<span class="cart-badge hidden" id="cartBadge">0</span>
    </div>
    <div id="navAuthArea"></div>
  </div>
</nav>

<section class="hero">
  <div class="hero-text">
    <span class="hero-eyebrow">New arrivals every week</span>
    <h1>Things you'll <em>actually</em> use.</h1>
    <p>No gimmicks, no filler — just well-made tech, fitness gear, kitchen tools, and everyday essentials at honest prices.</p>
  </div>
</section>

<div class="category-bar" id="categoryBar">
  <button class="cat-chip active" data-slug="" onclick="filterCategory('')">All Products</button>
</div>

<section class="product-section">
  <div class="product-grid" id="productGrid">
    <!-- products injected by catalog.js -->
  </div>
</section>

<div class="toast-container" id="toastContainer"></div>

<script src="js/auth.js"></script>
<script src="js/catalog.js"></script>
</body>
</html>
