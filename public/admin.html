<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — ShopApp</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="nav-logo">Shop<span class="dot">.</span> <span style="font-size:12px; font-family:'Inter';font-weight:500;opacity:0.6;">Admin</span></div>
    <div class="admin-nav-item active" data-tab="products" onclick="switchAdminTab('products')">📦 Products</div>
    <div class="admin-nav-item" data-tab="orders" onclick="switchAdminTab('orders')">📋 Orders</div>
    <div class="admin-nav-item" onclick="window.location.href='index.html'">← Back to Store</div>
  </aside>

  <main class="admin-main">

    <!-- PRODUCTS TAB -->
    <div id="adminProductsTab">
      <div class="admin-header">
        <h2>Products</h2>
        <button class="btn-primary" onclick="openProductModal()">+ Add Product</button>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="adminProductsTableBody"></tbody>
      </table>
    </div>

    <!-- ORDERS TAB -->
    <div id="adminOrdersTab" class="hidden">
      <div class="admin-header">
        <h2>Orders</h2>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>Order #</th>
            <th>Customer</th>
            <th>Total</th>
            <th>Status</th>
            <th>Date</th>
            <th>Update</th>
          </tr>
        </thead>
        <tbody id="adminOrdersTableBody"></tbody>
      </table>
    </div>

  </main>
</div>

<!-- PRODUCT FORM MODAL -->
<div class="modal-overlay hidden" id="productModal">
  <div class="modal-box">
    <h2 id="productModalTitle">Add Product</h2>

    <div class="field-group">
      <label>Product Name</label>
      <input type="text" id="pName" placeholder="e.g. Wireless Headphones">
    </div>
    <div class="field-group">
      <label>Description</label>
      <input type="text" id="pDescription" placeholder="Short description">
    </div>
    <div class="form-row-2">
      <div class="field-group">
        <label>Price ($)</label>
        <input type="number" id="pPrice" step="0.01" placeholder="49.99">
      </div>
      <div class="field-group">
        <label>Stock</label>
        <input type="number" id="pStock" placeholder="50">
      </div>
    </div>
    <div class="field-group">
      <label>Category</label>
      <select id="pCategory" style="width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:8px; font-family:inherit; font-size:14px;"></select>
    </div>
    <div class="field-group">
      <label>Image Path</label>
      <input type="text" id="pImage" placeholder="/images/product.jpg">
    </div>

    <div style="display:flex; gap:10px; margin-top:20px;">
      <button class="btn-secondary" onclick="closeProductModal()" style="flex:1;">Cancel</button>
      <button class="btn-primary" onclick="saveProduct()" style="flex:1;" id="saveProductBtn">Save Product</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
